name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed by softprops/action-gh-release to create the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            linux-tools-common \
            linux-tools-generic \
            libbpf-dev \
            libelf-dev \
            zlib1g-dev \
            libzstd-dev
          # bpftool ships in linux-tools-<kernel>; the -generic alias gives us a
          # usable bpftool without pinning to the runner's kernel version.
          sudo ln -sf "$(ls -1 /usr/lib/linux-tools*/bpftool | head -1)" /usr/local/bin/bpftool || true
          which bpftool && bpftool version

      - name: Fetch pre-built vmlinux.h
        # The runner's bpftool can't reliably parse its kernel's BTF (version
        # skew). Use the pre-generated vmlinux.h shipped by libbpf-bootstrap —
        # CO-RE relocations handle any field-layout differences at load time,
        # so a slightly stale header works on any kernel >= 5.15.
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          # libbpf/vmlinux.h keeps the real header at include/<arch>/vmlinux_X.Y.h
          # with vmlinux.h itself as a symlink. raw.githubusercontent.com
          # returns the symlink TARGET (a short string), not the file content,
          # so we resolve the symlink ourselves and fetch the versioned file.
          case "$ARCH" in
            x86_64)  ARCH_DIR=x86 ;;
            aarch64) ARCH_DIR=aarch64 ;;
            *)       echo "unknown arch $ARCH" >&2; exit 1 ;;
          esac
          BASE="https://raw.githubusercontent.com/libbpf/vmlinux.h/main/include/${ARCH_DIR}"
          TARGET=$(curl -fsSL "${BASE}/vmlinux.h" | tr -d '[:space:]')
          echo "Symlink vmlinux.h -> ${TARGET}"
          mkdir -p src
          curl -fsSL "${BASE}/${TARGET}" -o src/vmlinux.h
          wc -l src/vmlinux.h
          head -3 src/vmlinux.h

      - name: Build (static libbpf / libelf / zlib / libzstd)
        run: |
          # No `make clean` here — it would delete the vmlinux.h we just
          # downloaded, and the runner's bpftool can't regenerate it.
          # Fresh checkout means nothing to clean anyway.
          #
          # LDFLAGS must be passed on the make command line — env-var override
          # would lose to the Makefile's `LDFLAGS := ...` immediate assignment.
          # -Bstatic forces the immediately-following -l flags to use .a files;
          # -Bdynamic restores default linking for libstdc++/libm/libgcc_s/libc
          # which g++ auto-links after our explicit LDFLAGS.
          make LDFLAGS="-Wl,-Bstatic -lbpf -lelf -lz -lzstd -Wl,-Bdynamic"
          strip bin/nleash bin/nleash-helper
          file bin/nleash
          echo "--- ldd output ---"
          ldd bin/nleash || true
          echo "--- BPF stack libs should NOT appear above ---"

      - name: Stage release tree
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          NAME="nleash-${VERSION}-linux-${ARCH}"
          mkdir -p "stage/${NAME}/bin" "stage/${NAME}/man"
          cp bin/nleash bin/nleash-helper "stage/${NAME}/bin/"
          cp man/nleash.1                  "stage/${NAME}/man/"
          cp README.md DESIGN.md LICENSE CHANGELOG.md "stage/${NAME}/"
          tar -C stage -czf "${NAME}.tar.gz" "${NAME}"
          sha256sum "${NAME}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nleash-${{ matrix.arch }}
          path: nleash-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA256SUMS
        run: |
          cd dist
          sha256sum nleash-*-linux-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: true
          files: |
            dist/nleash-*-linux-*.tar.gz
            dist/SHA256SUMS
